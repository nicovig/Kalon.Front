<aside class="sidebar">
  <div class="logo">
    <img src="/assets/img/logo_rounded.png" alt="Kalon" class="logo-image">
    <div>
      <div class="logo-name">Kalon</div>
      <!-- <div class="logo-tagline"></div> -->
    </div>
  </div>
  <a
    class="nav-item"
    [routerLink]="['/']"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <span class="nav-icon">🏠</span><span class="nav-text">Accueil</span>
  </a>

  <div class="nav-label">Données</div>
  <a class="nav-item" [routerLink]="['/profils']" routerLinkActive="active">
    <span class="nav-icon">👥</span><span class="nav-text">Profils</span>
  </a>
  <a class="nav-item" [routerLink]="['/carte']" routerLinkActive="active">
    <span class="nav-icon">🗺️</span><span class="nav-text">Carte des profils</span>
  </a>

  <div class="nav-label">Contributions</div>
  <a class="nav-item" [routerLink]="['/analyse']" routerLinkActive="active">
    <span class="nav-icon">📈</span><span class="nav-text">Analyse</span>
  </a>

  <div class="nav-label">Communication</div>
  <a class="nav-item" [routerLink]="['/relances']" routerLinkActive="active">
    <span class="nav-icon">💌</span><span class="nav-text">Relances</span> <span class="nav-badge" *ngIf="kpiToRemind() > 0">{{ kpiToRemind() }}</span>
  </a>
  <a class="nav-item" [routerLink]="['/documents']" routerLinkActive="active">
    <span class="nav-icon">🧾</span><span class="nav-text">Documents</span>
  </a>
  <a class="nav-item" [routerLink]="['/recherche']" routerLinkActive="active">
    <span class="nav-icon">🔍</span><span class="nav-text">Recherche intelligente</span>
  </a>

  <div class="nav-label">Outils</div>
  <a class="nav-item" [routerLink]="['/import']" routerLinkActive="active">
    <span class="nav-icon">📥</span><span class="nav-text">Import</span>
  </a>
  <a class="nav-item" [routerLink]="['/archives']" routerLinkActive="active">
    <span class="nav-icon">📁</span><span class="nav-text">Archives</span>
  </a>

  <div class="nav-label">Compte</div>
  <a class="nav-item" [routerLink]="['/parametres']" routerLinkActive="active">
    <span class="nav-icon">⚙️</span><span class="nav-text">Paramètres</span>
  </a>

  <div class="sidebar-footer">
    <div
      class="asso-card"
      role="button"
      tabindex="0"
      (click)="onAssoCardClick($event)"
      (keydown.enter)="onAssoCardKeyDown($event)"
      (keydown.space)="onAssoCardKeyDown($event)"
    >
      <div class="asso-av">{{ userInitials }}</div>
      <div>
        <div class="asso-name">Asso Parents d'élèves</div>
        <div class="asso-plan"><span class="plan-dot"></span> Plan Basic</div>
      </div>
    </div>

    <div
      class="logout-menu"
      *ngIf="logoutMenuOpen"
      [style.left.px]="logoutMenuX"
      [style.top.px]="logoutMenuY"
      (click)="$event.stopPropagation()"
      role="menu"
    >
      <button class="logout-item" type="button" (click)="onLogout()">
        Se déconnecter
      </button>
    </div>
  </div>
</aside>
