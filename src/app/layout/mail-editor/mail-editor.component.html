<div class="mail-editor">
  <div class="mail-editor-head">
    <label for="mail-editor-subject">Objet</label>
    <input
      id="mail-editor-subject"
      type="text"
      [ngModel]="subject"
      (ngModelChange)="onSubjectInput($event)"
      placeholder="Objet du message"
    />
  </div>

  <div class="mail-editor-layout">
    <div class="mail-editor-main">
      <div class="mail-editor-actions-card">
        <div class="mail-editor-actions-title">Actions de mise en forme</div>
        <div class="mail-editor-toolbar">
          <button-label-component type="mail" (click)="toggleMark('bold')"><strong>Bold</strong></button-label-component>
          <button-label-component type="mail" (click)="toggleUnderline()"><u>Souligner</u></button-label-component>
          <button-label-component type="mail" (click)="toggleMark('bold')">Texte épais</button-label-component>
          <button-label-component type="mail" (click)="toggleMark('italic')"><em>Italique</em></button-label-component>
          <label class="mail-editor-color">
            <span>Couleur</span>
            <input
              type="color"
              [ngModel]="selectedTextColor"
              (ngModelChange)="onTextColorChange($event)"
            />
          </label>
        </div>
      </div>

      <div class="mail-editor-body">
        <tiptap-editor [editor]="editor" [ngModel]="body"></tiptap-editor>
      </div>
    </div>

    <div class="mail-editor-side">
      <div class="mail-editor-side-card mail-editor-side-card--emoji">
        <details class="mail-editor-accordion">
          <summary class="mail-editor-accordion-summary">
            <span class="mail-editor-side-title">Emojis</span>
            <span class="mail-editor-accordion-icon">▾</span>
          </summary>
          <div class="mail-editor-accordion-content">
            <emoji-holder (emojiSelected)="onEmojiSelected($event)"></emoji-holder>
          </div>
        </details>
      </div>

      <div class="mail-editor-side-card mail-editor-side-card--assets">
        <div class="mail-editor-side-title">Blocs et images enregistrés</div>
        <div class="mail-editor-asset-group">
          <label for="mail-editor-text-block">Bloc de texte</label>
          <div class="mail-editor-asset-row">
            <select
              id="mail-editor-text-block"
              [ngModel]="selectedTextBlockId ?? ''"
              (ngModelChange)="onSelectedTextBlockChange($event)"
            >
              <option value="">Sélectionner un bloc</option>
              @for (block of textBlocks; track block.id) {
                <option [value]="block.id">{{ block.label }}</option>
              }
            </select>
            <button-label-component
              type="ghost"
              [disabled]="!selectedTextBlockId"
              (click)="insertSelectedTextBlock()"
            >
              Insérer
            </button-label-component>
          </div>
        </div>

        <div class="mail-editor-asset-group">
          <label for="mail-editor-image">Image</label>
          <div class="mail-editor-asset-row">
            <select
              id="mail-editor-image"
              [ngModel]="selectedImageId ?? ''"
              (ngModelChange)="onSelectedImageChange($event)"
            >
              <option value="">Sélectionner une image</option>
              @for (image of images; track image.id) {
                <option [value]="image.id">{{ image.label }}</option>
              }
            </select>
            <button-label-component
              type="ghost"
              [disabled]="!selectedImageId"
              (click)="insertSelectedImage()"
            >
              Insérer
            </button-label-component>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
