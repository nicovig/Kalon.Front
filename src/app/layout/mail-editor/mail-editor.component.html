<div class="mail-editor">
  <div class="mail-editor-layout">
    <div class="mail-editor-main">
      @if (showSubject) {
        <div class="mail-editor-subject-card">
          <div class="mail-editor-subject-inline">
            <label for="mail-editor-subject">Objet</label>
            <input
              id="mail-editor-subject"
              type="text"
              [ngModel]="subject"
              (ngModelChange)="onSubjectInput($event)"
              placeholder="Objet du message"
            />
          </div>
        </div>
      }

      <div class="mail-editor-body-card">
        <div class="mail-editor-toolbar">
          <button-label-component type="mail" (click)="toggleMark('bold')"><strong>Gras</strong></button-label-component>
          <button-label-component type="mail" (click)="toggleUnderline()"><u>Souligner</u></button-label-component>
          <button-label-component type="mail" (click)="toggleMark('italic')"><em>Italique</em></button-label-component>
          <button-label-component type="mail" (click)="toggleHighlight()">Surligner</button-label-component>
          <label class="mail-editor-color">
            <span>Surlignage</span>
            <input
              type="color"
              [ngModel]="selectedHighlightColor"
              (ngModelChange)="onHighlightColorChange($event)"
            />
          </label>
          <label class="mail-editor-select">
            <span>Police</span>
            <select [ngModel]="selectedFontFamily" (ngModelChange)="onFontFamilyChange($event)">
              @for (item of fontFamilies; track item.value) {
                <option [value]="item.value">{{ item.label }}</option>
              }
            </select>
          </label>
          <label class="mail-editor-select">
            <span>Taille</span>
            <select [ngModel]="selectedFontSize" (ngModelChange)="onFontSizeChange($event)">
              @for (size of fontSizes; track size) {
                <option [value]="size">{{ size }}</option>
              }
            </select>
          </label>
          <label class="mail-editor-color">
            <span>Couleur</span>
            <input
              type="color"
              [ngModel]="selectedTextColor"
              (ngModelChange)="onTextColorChange($event)"
            />
          </label>
        </div>
        <div class="mail-editor-body">
          <div class="mail-editor-dropzone" (dragover)="onEditorDragOver($event)" (drop)="onEditorDrop($event)">
            <tiptap-editor [editor]="editor"></tiptap-editor>
          </div>
        </div>
      </div>
    </div>

    <div class="mail-editor-side">
      <div class="mail-editor-side-card mail-editor-side-card--emoji">
        <details class="mail-editor-accordion">
          <summary class="mail-editor-accordion-summary">
            <span class="mail-editor-side-title">Emojis</span>
            <span class="mail-editor-accordion-icon">▾</span>
          </summary>
          <div class="mail-editor-accordion-content">
            <emoji-holder (emojiSelected)="onEmojiSelected($event)"></emoji-holder>
          </div>
        </details>
      </div>

      <div class="mail-editor-side-card mail-editor-side-card--assets">
        <div class="mail-editor-side-title mail-editor-side-title--main">Blocs et images enregistrés</div>
        <div class="mail-editor-asset-group">
          <label>Bloc de texte</label>
          <div class="mail-editor-tags">
            @for (block of textBlocks; track block.id) {
              <button
                type="button"
                class="mail-editor-tag"
                [class.mail-editor-tag--selected]="selectedTextBlockId === block.id"
                draggable="true"
                (dragstart)="onTextBlockDragStart($event, block)"
                (click)="onTextBlockClick(block.id)"
              >
                {{ block.label }}
              </button>
            }
          </div>
        </div>

        <div class="mail-editor-asset-group">
          <label>Image</label>
          <div class="mail-editor-tags">
            @for (image of images; track image.id) {
              <button
                type="button"
                class="mail-editor-tag"
                [class.mail-editor-tag--selected]="selectedImageId === image.id"
                draggable="true"
                (dragstart)="onImageDragStart($event, image)"
                (click)="onImageClick(image.id)"
              >
                {{ image.label }}
              </button>
            }
          </div>
        </div>

        <div class="mail-editor-asset-group">
          <label>Données contact</label>
          <div class="mail-editor-tags">
            @for (tag of variableTags; track tag.id) {
              <button
                type="button"
                class="mail-editor-tag mail-editor-tag--variable"
                draggable="true"
                (dragstart)="onVariableTagDragStart($event, tag)"
                (click)="onVariableTagClick(tag)"
              >
                {{ tag.label }}
              </button>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
