<button-label-component type="ghost" (click)="openModal()">Paramètres</button-label-component>

@if (open()) {
  <app-popup-shell [maxWidth]="'720px'" [zIndex]="2065" (dismiss)="closeModal()">
    <div popup-header>
      <div class="ds-title">Paramètres des statuts donateurs</div>
      <p class="ds-sub">Définissez vos propres règles pour classer vos donateurs.</p>
    </div>

    <div class="ds-grid">
      <div class="ds-row">
        <label class="ds-inline" for="new-days">
          <span class="badge b-new">Nouveau</span>
          <span class="ds-inline-text">pendant</span>
          <form-text-component
            id="new-days"
            class="ds-input ds-input--inline"
            [type]="'text'"
            [icon]="null"
            [value]="'' + newForDays()"
            [width]="'84px'"
            (valueChange)="onNewForDaysChange($event)"
          ></form-text-component>
          <span class="ds-inline-text">jours</span>
        </label>
      </div>

      <div class="ds-row">
        <label class="ds-inline" for="to-remind-months">
          <span class="badge b-relance">À relancer</span>
          <span class="ds-inline-text">après</span>
          <form-text-component
            id="to-remind-months"
            class="ds-input ds-input--inline"
            [type]="'text'"
            [icon]="null"
            [value]="'' + toRemindAfterMonths()"
            [width]="'84px'"
            (valueChange)="onToRemindAfterMonthsChange($event)"
          ></form-text-component>
          <span class="ds-inline-text">mois</span>
        </label>
      </div>

      <div class="ds-row">
        <label class="ds-inline" for="inactive-months">
          <span class="badge b-relance">Inactif</span>
          <span class="ds-inline-text">après</span>
          <form-text-component
            id="inactive-months"
            class="ds-input ds-input--inline"
            [type]="'text'"
            [icon]="null"
            [value]="'' + inactiveAfterMonths()"
            [width]="'84px'"
            (valueChange)="onInactiveAfterMonthsChange($event)"
          ></form-text-component>
          <span class="ds-inline-text">mois</span>
        </label>
      </div>
    </div>

    <div class="ds-active-note">
      <span class="badge b-active">Actif</span>
      <span>Le statut actif est attribué automatiquement quand aucune règle ci-dessus ne s’applique.</span>
    </div>

    <div class="ds-actions">
      <button-label-component type="ghost" (click)="resetDefaults()">Valeurs par défaut</button-label-component>
      <button-label-component type="primary" (click)="save()">Enregistrer</button-label-component>
    </div>
  </app-popup-shell>
}
