<form class="df-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <fieldset class="df-kind">
    <legend class="df-kind-legend">Nature du donateur</legend>
    <div class="df-kind-row">
      <label class="df-kind-option">
        <input type="radio" formControlName="kind" value="individual" />
        <span>Particulier</span>
      </label>
      <label class="df-kind-option">
        <input type="radio" formControlName="kind" value="company" />
        <span>Entreprise ou autre personne morale</span>
      </label>
    </div>
  </fieldset>

  @if (form.get('kind')?.value === 'individual') {
    <div class="df-panel">
      <div class="df-grid">
        <div class="df-field">
          <label class="df-label" for="df-firstname">Prénom</label>
          <form-text-component
            id="df-firstname"
            formControlName="firstname"
            placeholder="Marie"
            [required]="true"
            type="text"
            [icon]="null"
            width="100%"
          ></form-text-component>
        </div>

        <div class="df-field">
          <label class="df-label" for="df-lastname">Nom</label>
          <form-text-component
            id="df-lastname"
            formControlName="lastname"
            placeholder="Dupont"
            [required]="true"
            type="text"
            [icon]="null"
            width="100%"
          ></form-text-component>
        </div>

        <div class="df-field df-span-2">
          <label class="df-label" for="df-email">Email</label>
          <form-text-component
            id="df-email"
            formControlName="email"
            placeholder="marie.dupont@example.org"
            [required]="true"
            type="email"
            [icon]="null"
            width="100%"
          ></form-text-component>
        </div>

        <div class="df-field">
          <label class="df-label" for="df-phone">Téléphone</label>
          <form-text-component
            id="df-phone"
            formControlName="phone"
            placeholder="+33 6 12 34 56 78"
            type="tel"
            [icon]="null"
            width="100%"
          ></form-text-component>
        </div>
      </div>

      <div class="df-section">
        <div class="df-section-title">Adresse</div>

        <div formGroupName="address">
          <div class="df-grid df-grid-address">
            <div class="df-field df-span-2">
              <label class="df-label" for="df-street">Rue</label>
              <form-text-component
                id="df-street"
                formControlName="street"
                placeholder="12 rue de la Paix"
                [required]="true"
                type="text"
                [icon]="null"
                width="100%"
              ></form-text-component>
            </div>

            <div class="df-field">
              <label class="df-label" for="df-postalCode">Code postal</label>
              <form-text-component
                id="df-postalCode"
                formControlName="postalCode"
                placeholder="75001"
                [required]="true"
                type="text"
                [icon]="null"
                width="100%"
              ></form-text-component>
            </div>

            <div class="df-field">
              <label class="df-label" for="df-city">Ville</label>
              <form-text-component
                id="df-city"
                formControlName="city"
                placeholder="Paris"
                [required]="true"
                type="text"
                [icon]="null"
                width="100%"
              ></form-text-component>
            </div>

            <div class="df-field df-span-2">
              <label class="df-label" for="df-country">Pays</label>
              <form-text-component
                id="df-country"
                formControlName="country"
                placeholder="France"
                [required]="true"
                type="text"
                [icon]="null"
                width="100%"
              ></form-text-component>
            </div>
          </div>
        </div>
      </div>
    </div>
  } @else {
    <div class="df-panel">
      <div class="df-grid">
        <div class="df-field df-span-2">
          <label class="df-label" for="df-email-co">Email</label>
          <form-text-component
            id="df-email-co"
            formControlName="email"
            placeholder="contact@entreprise.fr"
            [required]="true"
            type="email"
            [icon]="null"
            width="100%"
          ></form-text-component>
        </div>

        <div class="df-field">
          <label class="df-label" for="df-phone-co">Téléphone</label>
          <form-text-component
            id="df-phone-co"
            formControlName="phone"
            placeholder="+33 1 23 45 67 89"
            type="tel"
            [icon]="null"
            width="100%"
          ></form-text-component>
        </div>
      </div>

      <div class="df-section">
        <div class="df-section-title">Personne morale</div>

        <div formGroupName="enterprise">
          <div class="df-grid">
            <div class="df-field df-span-2">
              <label class="df-label" for="df-enterpriseName">Raison sociale</label>
              <form-text-component
                id="df-enterpriseName"
                formControlName="name"
                placeholder="Association ou société"
                [required]="true"
                type="text"
                [icon]="null"
                width="100%"
              ></form-text-component>
            </div>

            <div class="df-field">
              <label class="df-label" for="df-enterpriseSiret">SIRET</label>
              <form-text-component
                id="df-enterpriseSiret"
                formControlName="siret"
                placeholder="123 456 789 00000"
                [required]="true"
                type="text"
                [icon]="null"
                width="100%"
              ></form-text-component>
            </div>
          </div>

          <div class="df-subsection">
            <div class="df-subsection-title">Adresse du siège social</div>

            <div formGroupName="address">
              <div class="df-grid df-grid-address">
                <div class="df-field df-span-2">
                  <label class="df-label" for="df-enterpriseStreet">Rue</label>
                  <form-text-component
                    id="df-enterpriseStreet"
                    formControlName="street"
                    placeholder="12 rue de la Paix"
                    [required]="true"
                    type="text"
                    [icon]="null"
                    width="100%"
                  ></form-text-component>
                </div>

                <div class="df-field">
                  <label class="df-label" for="df-enterprisePostalCode">Code postal</label>
                  <form-text-component
                    id="df-enterprisePostalCode"
                    formControlName="postalCode"
                    placeholder="75001"
                    [required]="true"
                    type="text"
                    [icon]="null"
                    width="100%"
                  ></form-text-component>
                </div>

                <div class="df-field">
                  <label class="df-label" for="df-enterpriseCity">Ville</label>
                  <form-text-component
                    id="df-enterpriseCity"
                    formControlName="city"
                    placeholder="Paris"
                    [required]="true"
                    type="text"
                    [icon]="null"
                    width="100%"
                  ></form-text-component>
                </div>

                <div class="df-field df-span-2">
                  <label class="df-label" for="df-enterpriseCountry">Pays</label>
                  <form-text-component
                    id="df-enterpriseCountry"
                    formControlName="country"
                    placeholder="France"
                    [required]="true"
                    type="text"
                    [icon]="null"
                    width="100%"
                  ></form-text-component>
                </div>
              </div>
            </div>
          </div>

          <div class="df-subsection">
            <div class="df-subsection-title">Représentant (facultatif)</div>
            <div class="df-grid">
              <div class="df-field">
                <label class="df-label" for="df-contact-fn">Prénom</label>
                <form-text-component
                  id="df-contact-fn"
                  formControlName="contactFirstname"
                  placeholder="Prénom"
                  type="text"
                  [icon]="null"
                  width="100%"
                ></form-text-component>
              </div>

              <div class="df-field">
                <label class="df-label" for="df-contact-ln">Nom</label>
                <form-text-component
                  id="df-contact-ln"
                  formControlName="contactLastname"
                  placeholder="Nom"
                  type="text"
                  [icon]="null"
                  width="100%"
                ></form-text-component>
              </div>
            </div>
          </div>


        </div>
      </div>
    </div>
  }

  @if (submitted && errorMessage) {
    <div class="df-error" role="alert">{{ errorMessage }}</div>
  }

  <div class="df-actions">
    <button-component type="primary" htmlType="submit" [disabled]="form.invalid">Créer</button-component>
  </div>
</form>
