<toast-component position="center-third"></toast-component>
<topbar
  [title]="'Les donateurs'"
  [subtitle]="'Gérez vos donateurs avec facilité'"
>
  <button-component type="ghost">📥 Importer Excel</button-component>
  <button-component type="primary" (click)="openCreateModal()">+ Nouveau donateur</button-component>
</topbar>

@if (createModalOpen) {
  <donor-create-popup (closed)="closeCreateModal()"></donor-create-popup>
}

<table-component
  [rows]="donorsComputed()"
  [columns]="donorColumns"
  [pageSizeOptions]="[25, 50, 100]"
  [initialPageSize]="25"
></table-component>
