<div class="donor-list-page">
  <toast-component position="center-third"></toast-component>
  <topbar
    [title]="'Les donateurs'"
    [subtitle]="'Gérez vos donateurs avec facilité'"
  >
    <donor-create-launcher></donor-create-launcher>
  </topbar>

  <import-donor-banner />

  <table-component
    [rows]="donorsComputed()"
    [columns]="donorColumns"
    [pageSizeOptions]="[25, 50, 100]"
    [initialPageSize]="25"
    [showRowActions]="true"
    (rowEdit)="onEditDonor($event)"
    (rowViewDonations)="onViewDonations($event)"
  ></table-component>
</div>

@if (donorToEdit(); as d) {
  <edit-donor-popup [donor]="d" (closed)="closeEditDonor()" />
}

@if (donorToViewDonations(); as dv) {
  <donor-donations-popup [donor]="dv" (closed)="closeViewDonations()" />
}
