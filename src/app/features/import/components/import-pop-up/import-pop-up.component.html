<app-popup-shell [maxWidth]="'760px'" [zIndex]="2065" (dismiss)="onDismiss()">
  <div popup-header>
    <div class="imp-pop-title">Par quoi commencer ?</div>
    <p class="imp-pop-sub">Choisissez le type d’import, puis validez pour passer à l’envoi du fichier.</p>
  </div>

  <div class="iob-type-grid" role="list" aria-label="Type d'import">
    @for (opt of options; track opt.mode) {
      <button
        type="button"
        class="iob-type-card"
        [class.iob-type-card--active]="activeMode() === opt.mode"
        (click)="pick(opt.mode)"
      >
        <span class="iob-type-icon" aria-hidden="true">{{
          opt.mode === 'donors' ? '👤' : opt.mode === 'donations' ? '💶' : '🔗'
        }}</span>
        <h3 class="iob-type-title">{{ opt.label }}</h3>
        <p class="iob-type-blurb">{{ opt.blurb }}</p>
        <p class="iob-type-hint">{{ opt.hint }}</p>
      </button>
    }
  </div>

  <div class="iob-actions">
    <button-label-component
      type="primary"
      [disabled]="!activeMode()"
      (click)="onContinue()"
    >
      Continuer
    </button-label-component>
  </div>
</app-popup-shell>
