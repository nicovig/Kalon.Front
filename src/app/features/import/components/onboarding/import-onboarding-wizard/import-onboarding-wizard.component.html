<section class="iob" aria-labelledby="iob-title">
  <div class="iob-viewport">
    <div class="iob-track" [class.iob-track--file]="step() === 'file'">
      <div class="iob-panel iob-panel--type">
        <import-step-trail [step]="step()" />

        <h2 id="iob-title" class="iob-title">Par quoi commencer ?</h2>
        <p class="iob-lead">
          Choisissez le type d’import, puis validez pour passer à l’envoi du fichier.
        </p>

        <choice-cards
          [options]="options"
          [selectedKey]="mode()"
          ariaLabel="Type d'import"
          (optionSelected)="onModeChange($any($event))"
        ></choice-cards>

        <div class="iob-actions">
          <button-label-component type="primary" (click)="goToFileStep()">Continuer</button-label-component>
        </div>
      </div>

      <div class="iob-panel iob-panel--file">
        <import-step-trail [step]="step()" />

        <h2 class="iob-title iob-title--file">Déposez votre fichier</h2>
        <p class="iob-lead iob-lead--file">CSV ou Excel — la lecture est automatique.</p>

        <div class="iob-drop">
          @if (parsing()) {
            <div class="iob-loader">
              <inline-loader size="lg" label="Lecture de votre fichier…" />
            </div>
          } @else {
            <import-banner variant="xxl" [navigate]="false" (fileSelected)="onFile($event)" />
          }
        </div>

        <div class="iob-back">
          <button-label-component type="ghost" (click)="goBackToType()">← Retour au choix du type</button-label-component>
        </div>
      </div>
    </div>
  </div>
</section>
