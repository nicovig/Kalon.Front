<div class="itc-root" role="region" aria-roledescription="carrousel" aria-label="Type d’import">
  <div class="itc-car-wrap">
    <button
      type="button"
      class="itc-nav itc-nav--prev"
      aria-label="Type précédent"
      (click)="navigate(-1)"
    >
      ‹
    </button>
    <div class="itc-viewport-shell">
      <div class="itc-fade itc-fade--left" aria-hidden="true"></div>
      <div class="itc-fade itc-fade--right" aria-hidden="true"></div>
      <div
        class="itc-viewport"
        #modeViewport
        tabindex="0"
        (scroll)="onViewportScroll()"
        (keydown)="onKeydown($event)"
      >
        @for (opt of options; track opt.mode) {
          <article
            class="itc-slide"
            [class.itc-slide--active]="mode() === opt.mode"
            [class.itc-slide--dim]="mode() !== opt.mode"
            (click)="selectMode(opt.mode)"
          >
            <div class="itc-slide-inner">
              <span class="itc-ic" aria-hidden="true">{{
                opt.mode === 'donors' ? '👤' : opt.mode === 'donations' ? '💶' : '🔗'
              }}</span>
              <h3 class="itc-h">{{ opt.label }}</h3>
              <p class="itc-blurb">{{ opt.blurb }}</p>
              <p class="itc-hint">{{ opt.hint }}</p>
            </div>
          </article>
        }
      </div>
    </div>
    <button
      type="button"
      class="itc-nav itc-nav--next"
      aria-label="Type suivant"
      (click)="navigate(1)"
    >
      ›
    </button>
  </div>

  <div class="itc-dots" role="tablist" aria-label="Choix du type">
    @for (opt of options; track opt.mode) {
      <button
        type="button"
        class="itc-dot"
        [class.itc-dot--active]="mode() === opt.mode"
        [attr.aria-selected]="mode() === opt.mode"
        [attr.aria-label]="opt.label"
        (click)="selectMode(opt.mode)"
      ></button>
    }
  </div>
</div>
