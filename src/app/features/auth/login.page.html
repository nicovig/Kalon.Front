<div class="login-shell">
  <div class="login-panel">
    <div class="login-header">
      <div class="login-logo-wrap" aria-hidden="true">
        <img src="/assets/img/logo_rounded.png" alt="Kalon" class="login-logo" />
      </div>
      <h1 class="login-title">Kalon</h1>
      <p class="login-sub">Retrouvez vos profils et vos reçus en un clin d'œil.</p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()">
      <form-text-component
        id="email"
        name="email"
        type="email"
        autocomplete="email"
        placeholder="Adresse email"
        [required]="true"
        icon="📧"
        [(ngModel)]="email"
        width="100%"
      />

      <form-text-component
        id="password"
        type="password"
        autocomplete="current-password"
        placeholder="Mot de passe"
        [allowPasswordToggle]="true"
        width="100%"
      />

      <button type="submit" class="login-button">
        Me connecter
      </button>
    </form>

    <div class="login-footer">
      <span>Premier accès ?</span>
      <span>Demandez une invitation à l'équipe Kalon.</span>
    </div>
  </div>
</div>
