<app-popup-shell
  [maxWidth]="'min(980px, calc(100% - 32px))'"
  [zIndex]="2000"
  (dismiss)="onDismiss()"
>
  <div popup-header>
    <div class="app-popup-title">Nouveau profil</div>
    <p class="app-popup-sub">
      Choisissez <b>particulier</b> ou <b>personne morale</b> : les reçus fiscaux (CERFA) ne sont pas générés de la même façon.
    </p>
  </div>
  <contact-form (create)="onCreate($event)"></contact-form>
  @if (creating) {
    <inline-loader label="Enregistrement du profil..." />
  }
</app-popup-shell>
