<toast-component position="center-third"></toast-component>
<topbar
  [title]="'Bonjour, ' + currentUser?.firstname + ' 👋'"
  [subtitle]="'Voici ce qu\'il se passe sur votre association aujourd\'hui'"
>
  <donor-create-launcher></donor-create-launcher>
</topbar>

<import-donor-banner />

<div class="kpi-grid">
  <dashboard-card-component
    [type]="'violet'"
    [value]="187"
    [label]="'Donateurs actifs'"
    [helper]="'↑ +12 ce mois'"
    [icon]="'👥'"
  ></dashboard-card-component>
  <dashboard-card-component
    [type]="'pink'"
    [value]="4320"
    [label]="'Dons cette année'"
    [helper]="'↑ +8% vs. 2024'"
    [icon]="'💶'"
  ></dashboard-card-component>
  <dashboard-card-component
    [type]="'yellow'"
    [value]="34"
    [label]="'À relancer'"
    chip="warn"
    [helper]="'⚠ +12 mois sans don'"
    [icon]="'⏳'"
  ></dashboard-card-component>
  <dashboard-card-component
    [type]="'mint'"
    [value]="142"
    [label]="'Reçus générés'"
    [helper]="'↑ À jour'"
    [icon]="'🧾'"
  ></dashboard-card-component>
</div>

<!-- CONTENT GRID -->
<div class="content-grid">
  <!-- TABLE -->
  <card
    title="Derniers dons"
    [subtitle]="latestDonationsComputed().length + ' derniers dons enregistrés'"
  >
    <table-component
      [rows]="latestDonationsComputed()"
      [columns]="latestDonationsColumns"
      [pageSizeOptions]="[5, 10, 25]"
      [initialPageSize]="5"
      [clickableRows]="false"
    ></table-component>
  </card>

  <div class="right">
    <card variant="bare">
      <div class="quota-card">
        <div class="quota-top">
          <span class="quota-ttl">Mon plan</span>
          <span class="plan-pill">Basic</span>
        </div>
        <div class="q-item">
          <div class="q-lbl"><span>Donateurs</span><span>187 / 300</span></div>
          <div class="q-bar"><div class="q-fill fill-pink" style="width: 62%"></div></div>
        </div>
        <div class="q-item">
          <div class="q-lbl"><span>Mails envoyés</span><span>89 / 300</span></div>
          <div class="q-bar"><div class="q-fill fill-yellow" style="width: 30%"></div></div>
        </div>
        <div class="q-item">
          <div class="q-lbl"><span>Import Excel</span><span>112 / 150</span></div>
          <div class="q-bar"><div class="q-fill fill-mint" style="width: 75%"></div></div>
        </div>
        <button-label-component type="upgrade">⭐ Passer au Premium</button-label-component>
      </div>
    </card>

    <card
      title="À relancer en priorité"
      subtitle="Sans don depuis plus d'un an"
      paddingClass="advanced"
    >
      <div class="relance-row">
        <div class="r-dot" style="background: var(--pink)"></div>
        <div>
          <div class="r-name">Jean Dupont</div>
          <div class="r-since">Dernier don il y a 24 mois</div>
        </div>
        <div class="r-amt">80 €</div>
      </div>
      <div class="relance-row">
        <div class="r-dot" style="background: var(--yellow)"></div>
        <div>
          <div class="r-name">Pierre Leclerc</div>
          <div class="r-since">Dernier don il y a 21 mois</div>
        </div>
        <div class="r-amt">150 €</div>
      </div>
      <div class="relance-row">
        <div class="r-dot" style="background: var(--yellow)"></div>
        <div>
          <div class="r-name">Isabelle Moreau</div>
          <div class="r-since">Dernier don il y a 18 mois</div>
        </div>
        <div class="r-amt">60 €</div>
      </div>
      <div class="relance-row">
        <div class="r-dot" style="background: var(--ink-30)"></div>
        <div>
          <div class="r-name">Thomas Garnier</div>
          <div class="r-since">Dernier don il y a 15 mois</div>
        </div>
        <div class="r-amt">45 €</div>
      </div>
    </card>
  </div>
</div>
